<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Wheel Case | Ставки на цвета</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0b1a 0%, #0f111f 100%);
            font-family: -apple-system, 'Poppins', 'Segoe UI', system-ui, sans-serif;
            color: #fff;
            min-height: 100vh;
        }

        .app {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Верхняя панель */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            margin-bottom: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            font-size: 28px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .balance-box {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .balance-box span:first-child {
            font-size: 18px;
        }

        .balance-box span:last-child {
            font-weight: bold;
            font-size: 18px;
        }

        /* Колесо */
        .wheel-section {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }

        .wheel-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 0 6px rgba(255, 215, 0, 0.3);
        }

        .wheel-pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-top: 35px solid #ffd700;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.5));
            z-index: 10;
        }

        /* Ставки */
        .bet-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #8899aa;
            margin-bottom: 16px;
            text-align: center;
        }

        .color-buttons {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
        }

        .color-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent;
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }

        .color-btn.blue {
            border-color: #3b82f6;
        }

        .color-btn.blue .color-circle {
            background: #3b82f6;
            box-shadow: 0 0 15px #3b82f6;
        }

        .color-btn.green {
            border-color: #22c55e;
        }

        .color-btn.green .color-circle {
            background: #22c55e;
            box-shadow: 0 0 15px #22c55e;
        }

        .color-btn.active {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.02);
        }

        .color-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin: 0 auto 10px;
        }

        .color-btn span {
            font-size: 18px;
            font-weight: bold;
            display: block;
        }

        .color-btn small {
            font-size: 12px;
            color: #ffd700;
        }

        .bet-input {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .bet-input input {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px;
            color: white;
            font-size: 18px;
            text-align: center;
        }

        .bet-input input:focus {
            outline: none;
            border-color: #ffd700;
        }

        .place-bet-btn {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            border-radius: 12px;
            padding: 0 30px;
            font-weight: bold;
            font-size: 18px;
            color: #1a1a2e;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .place-bet-btn:active {
            transform: scale(0.95);
        }

        .bet-limits {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #8899aa;
            padding-top: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Таймер */
        .timer-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }

        .timer-circle {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 12px;
        }

        .timer-circle svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .timer-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .timer-text span {
            font-size: 36px;
            font-weight: bold;
        }

        .timer-text small {
            font-size: 10px;
            color: #8899aa;
        }

        .timer-status {
            font-size: 14px;
            color: #ffd700;
            font-weight: bold;
        }

        /* Результат */
        .result-section {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }

        .result-icon {
            font-size: 48px;
            margin-bottom: 8px;
        }

        .result-text {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .result-amount {
            font-size: 20px;
            font-weight: bold;
        }

        /* История */
        .history-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 16px;
        }

        .history-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 14px;
        }

        .history-color {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .history-color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .history-win {
            color: #ffd700;
        }

        .history-loss {
            color: #ff6b6b;
        }

        .history-empty {
            text-align: center;
            color: #8899aa;
            padding: 20px;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #0f111f);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            border: 2px solid #ffd700;
            animation: bounce 0.3s ease;
        }

        .modal-icon {
            font-size: 60px;
            margin-bottom: 16px;
        }

        .modal-amount {
            font-size: 48px;
            font-weight: bold;
            color: #ffd700;
            margin: 20px 0;
        }

        .modal-btn {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            border-radius: 40px;
            padding: 14px 28px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .confetti-piece {
            position: fixed;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: fall 3s linear forwards;
            z-index: 2000;
        }

        button {
            cursor: pointer;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Верхняя панель -->
        <div class="top-bar">
            <div class="logo">
                <span class="logo-icon">🎰</span>
                <span class="logo-text">WHEEL CASE</span>
            </div>
            <div class="balance-box">
                <span>💰</span>
                <span id="balance">1000</span>
                <span>TON</span>
            </div>
        </div>

        <!-- Колесо (только анимация) -->
        <div class="wheel-section">
            <div class="wheel-wrapper">
                <canvas id="wheelCanvas" width="400" height="400"></canvas>
                <div class="wheel-pointer"></div>
            </div>
        </div>

        <!-- Ставки -->
        <div class="bet-section">
            <div class="section-title">⚡ СДЕЛАЙ СТАВКУ ⚡</div>
            <div class="color-buttons">
                <button class="color-btn blue" data-color="blue">
                    <div class="color-circle"></div>
                    <span>СИНИЙ</span>
                    <small>x2</small>
                </button>
                <button class="color-btn green" data-color="green">
                    <div class="color-circle"></div>
                    <span>ЗЕЛЁНЫЙ</span>
                    <small>x2</small>
                </button>
            </div>
            <div class="bet-input">
                <input type="number" id="betAmount" placeholder="Сумма ставки" step="0.1" min="0.1" max="500" value="10">
                <button class="place-bet-btn" id="placeBetBtn">ПОСТАВИТЬ</button>
            </div>
            <div class="bet-limits">
                <span>📉 Мин: 0.1 TON</span>
                <span>📈 Макс: 500 TON</span>
                <span>🏆 Коэф: x2</span>
            </div>
        </div>

        <!-- Таймер -->
        <div class="timer-section" id="timerSection">
            <div class="timer-circle">
                <svg viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="8"/>
                    <circle cx="50" cy="50" r="45" fill="none" stroke="#ffd700" stroke-width="8" id="timerProgress" stroke-dasharray="283" stroke-dashoffset="0"/>
                </svg>
                <div class="timer-text">
                    <span id="timerSeconds">15</span>
                    <small>сек</small>
                </div>
            </div>
            <div class="timer-status" id="timerStatus">⚡ ПРИЁМ СТАВОК...</div>
        </div>

        <!-- Результат -->
        <div class="result-section" id="resultSection">
            <div class="result-icon" id="resultIcon">🎲</div>
            <div class="result-text" id="resultText"></div>
            <div class="result-amount" id="resultAmount"></div>
        </div>

        <!-- История -->
        <div class="history-section">
            <div class="section-title">📜 ИСТОРИЯ СТАВОК</div>
            <div class="history-list" id="historyList">
                <div class="history-empty">Нет ставок</div>
            </div>
        </div>
    </div>

    <!-- Модальное окно победы -->
    <div class="modal" id="winModal">
        <div class="modal-content">
            <div class="modal-icon">🏆</div>
            <div class="modal-amount" id="modalAmount">+0 TON</div>
            <button class="modal-btn" onclick="closeModal()">ОТЛИЧНО!</button>
        </div>
    </div>

    <script>
        // ==================== ДАННЫЕ ПОЛЬЗОВАТЕЛЯ ====================
        let userData = {
            balance: 1000,  // Начальный баланс
            history: []
        };

        // Константы игры
        const MIN_BET = 0.1;
        const MAX_BET = 500;
        const WIN_MULTIPLIER = 2.0;
        const ROUND_DURATION = 15;  // 15 секунд

        // Переменные состояния
        let selectedColor = null;
        let currentBet = null;
        let timerInterval = null;
        let timeLeft = ROUND_DURATION;
        let isRoundActive = false;
        let spinAngle = 0;
        let animationId = null;

        // ==================== КОЛЕСО (ТОЛЬКО ДЛЯ АНИМАЦИИ) ====================
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');

        // Цвета секторов
        const colors = ['#3b82f6', '#22c55e', '#3b82f6', '#22c55e', '#3b82f6', '#22c55e', '#3b82f6', '#22c55e'];
        const SEGMENTS = 8;
        const SEGMENT_ANGLE = 360 / SEGMENTS;

        function drawWheel() {
            const size = canvas.width;
            const centerX = size / 2;
            const centerY = size / 2;
            const radius = size / 2 - 10;
            
            ctx.clearRect(0, 0, size, size);
            
            for (let i = 0; i < SEGMENTS; i++) {
                const startAngle = (i * SEGMENT_ANGLE + spinAngle) * Math.PI / 180;
                const endAngle = ((i + 1) * SEGMENT_ANGLE + spinAngle) * Math.PI / 180;
                
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.fillStyle = colors[i];
                ctx.fill();
                ctx.strokeStyle = "#fff";
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Текст
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + SEGMENT_ANGLE / 2 * Math.PI / 180);
                ctx.textAlign = "center";
                ctx.fillStyle = "#fff";
                ctx.font = "bold 14px 'Segoe UI'";
                ctx.fillText(i % 2 === 0 ? "🔵" : "🟢", radius - 25, 6);
                ctx.restore();
            }
            
            // Центральный круг
            ctx.beginPath();
            ctx.arc(centerX, centerY, 35, 0, 360 * Math.PI / 180);
            ctx.fillStyle = "#ffd700";
            ctx.fill();
            ctx.fillStyle = "#1a1a2e";
            ctx.font = "bold 22px sans-serif";
            ctx.fillText("🎡", centerX - 15, centerY + 8);
        }

        function animateWheel(targetAngle, duration, onComplete) {
            const startAngle = spinAngle;
            const startTime = performance.now();
            
            function animate(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(1, elapsed / duration);
                const easeOut = 1 - Math.pow(1 - progress, 3);
                spinAngle = startAngle + (targetAngle - startAngle) * easeOut;
                drawWheel();
                
                if (progress < 1) {
                requestAnimationFrame(animate);
                } else {
                    if (onComplete) onComplete();
                }
            }
            
            requestAnimationFrame(animate);
        }

        function spinWheel(onComplete) {
            const targetSpins = 3 + Math.random() * 5;
            const targetAngle = spinAngle + targetSpins * 360;
            animateWheel(targetAngle, 2000, onComplete);
        }

        // ==================== ЛОГИКА СТАВОК ====================
        function updateBalanceUI() {
            document.getElementById('balance').textContent = userData.balance.toFixed(2);
        }

        function addToHistory(color, amount, isWin, winAmount = 0) {
            const historyList = document.getElementById('historyList');
            const emptyMsg = historyList.querySelector('.history-empty');
            if (emptyMsg) emptyMsg.remove();
            
            const item = document.createElement('div');
            item.className = 'history-item';
            const colorName = color === 'blue' ? 'Синий' : 'Зелёный';
            const colorHex = color === 'blue' ? '#3b82f6' : '#22c55e';
            
            item.innerHTML = `
                <div class="history-color">
                    <div class="history-color-dot" style="background: ${colorHex}"></div>
                    <span>${colorName}</span>
                </div>
                <div>${amount.toFixed(2)} TON</div>
                <div class="${isWin ? 'history-win' : 'history-loss'}">
                    ${isWin ? `+${winAmount.toFixed(2)}` : `-${amount.toFixed(2)}`} TON
                </div>
            `;
            historyList.insertBefore(item, historyList.firstChild);
            
            // Сохраняем в localStorage
            userData.history.unshift({ color, amount, isWin, winAmount, time: Date.now() });
            if (userData.history.length > 20) userData.history.pop();
            localStorage.setItem('gameHistory', JSON.stringify(userData.history));
        }

        function showResult(isWin, betAmount, winAmount, winningColor) {
            const resultSection = document.getElementById('resultSection');
            const resultIcon = document.getElementById('resultIcon');
            const resultText = document.getElementById('resultText');
            const resultAmount = document.getElementById('resultAmount');
            
            resultSection.style.display = 'block';
            
            if (isWin) {
                resultIcon.textContent = winningColor === 'blue' ? '🔵🎉' : '🟢🎉';
                resultText.textContent = 'ПОБЕДА!';
                resultAmount.textContent = `+${winAmount.toFixed(2)} TON`;
                resultAmount.style.color = '#ffd700';
            } else {
                resultIcon.textContent = winningColor === 'blue' ? '🔵😔' : '🟢😔';
                resultText.textContent = 'ПРОИГРЫШ';
                resultAmount.textContent = `-${betAmount.toFixed(2)} TON`;
                resultAmount.style.color = '#ff6b6b';
            }
            
            setTimeout(() => {
                resultSection.style.display = 'none';
            }, 3000);
        }

        function showWinModal(amount) {
            const modal = document.getElementById('winModal');
            document.getElementById('modalAmount').textContent = `+${amount.toFixed(2)} TON`;
            modal.style.display = 'flex';
            
            // Эффект конфетти
            for (let i = 0; i < 50; i++) {
                createConfetti();
            }
        }

        function createConfetti() {
            const confetti = document.createElement('div');
            confetti.className = 'confetti-piece';
            confetti.style.left = Math.random() * 100 + '%';
            confetti.style.background = `hsl(${Math.random() * 360}, 100%, 50%)`;
            document.body.appendChild(confetti);
            setTimeout(() => confetti.remove(), 3000);
        }

        function closeModal() {
            document.getElementById('winModal').style.display = 'none';
        }

        function startTimer() {
            timeLeft = ROUND_DURATION;
            const timerSection = document.getElementById('timerSection');
            const timerSeconds = document.getElementById('timerSeconds');
            const progressEl = document.getElementById('timerProgress');
            const timerStatus = document.getElementById('timerStatus');
            
            timerSection.style.display = 'block';
            timerStatus.textContent = '⚡ ПРИЁМ СТАВОК...';
            
            if (timerInterval) clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                timeLeft--;
                timerSeconds.textContent = timeLeft;
                const circumference = 283;
                const offset = circumference - (timeLeft / ROUND_DURATION) * circumference;
                progressEl.style.strokeDashoffset = offset;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerSection.style.display = 'none';
                }
            }, 1000);
        }

        function endRound(betAmount, betColor) {
            // Определяем победителя (50/50)
            const winningColor = Math.random() < 0.5 ? 'blue' : 'green';
            const isWin = betColor === winningColor;
            
            // Анимация колеса
            spinWheel(() => {
                if (isWin) {
                    const winAmount = betAmount * WIN_MULTIPLIER;
                    userData.balance += winAmount;
                    updateBalanceUI();
                    showResult(true, betAmount, winAmount, winningColor);
                    addToHistory(betColor, betAmount, true, winAmount);
                    showWinModal(winAmount);
                } else {
                    showResult(false, betAmount, 0, winningColor);
                    addToHistory(betColor, betAmount, false);
                }
                isRoundActive = false;
                currentBet = null;
            });
        }

        function placeBet() {
            if (isRoundActive) {
                alert('⏳ Раунд уже идёт! Дождитесь окончания.');
                return;
            }
            
            if (!selectedColor) {
                alert('❌ Выберите цвет: Синий или Зелёный');
                return;
            }
            
            const amount = parseFloat(document.getElementById('betAmount').value);
            
            if (isNaN(amount)) {
                alert('❌ Введите сумму ставки');
                return;
            }
            
            if (amount < MIN_BET) {
                alert(`❌ Минимальная ставка: ${MIN_BET} TON`);
                return;
            }
            
            if (amount > MAX_BET) {
                alert(`❌ Максимальная ставка: ${MAX_BET} TON`);
                return;
            }
            
            if (amount > userData.balance) {
                alert(`❌ Недостаточно средств! Баланс: ${userData.balance} TON`);
                return;
            }
            
            // Списываем ставку
            userData.balance -= amount;
            updateBalanceUI();
            
            // Сохраняем ставку
            currentBet = { amount, color: selectedColor };
            isRoundActive = true;
            
            // Запускаем таймер
            startTimer();
            
            // Завершаем раунд через ROUND_DURATION секунд
            setTimeout(() => {
                if (isRoundActive && currentBet) {
                    endRound(currentBet.amount, currentBet.color);
                }
            }, ROUND_DURATION * 1000);
        }

        // ==================== ЗАГРУЗКА ИСТОРИИ ====================
        function loadHistory() {
            const saved = localStorage.getItem('gameHistory');
            if (saved) {
                try {
                    userData.history = JSON.parse(saved);
                    const historyList = document.getElementById('historyList');
                    const emptyMsg = historyList.querySelector('.history-empty');
                    if (emptyMsg) emptyMsg.remove();
                    
                    userData.history.slice(0, 20).forEach(h => {
                        const item = document.createElement('div');
                        item.className = 'history-item';
                        const colorName = h.color === 'blue' ? 'Синий' : 'Зелёный';
                        const colorHex = h.color === 'blue' ? '#3b82f6' : '#22c55e';
                        
                        item.innerHTML = `
                            <div class="history-color">
                                <div class="history-color-dot" style="background: ${colorHex}"></div>
                                <span>${colorName}</span>
                            </div>
                            <div>${h.amount.toFixed(2)} TON</div>
                            <div class="${h.isWin ? 'history-win' : 'history-loss'}">
                                ${h.isWin ? `+${h.winAmount.toFixed(2)}` : `-${h.amount.toFixed(2)}`} TON
                            </div>
                        `;
                        historyList.appendChild(item);
                    });
                } catch(e) {}
            }
        }

        // ==================== ОБРАБОТЧИКИ СОБЫТИЙ ====================
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedColor = btn.dataset.color;
            });
        });
        
        document.getElementById('placeBetBtn').addEventListener('click', placeBet);
        
        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        drawWheel();
        updateBalanceUI();
        loadHistory();
        
        // Восстанавливаем баланс из localStorage
        const savedBalance = localStorage.getItem('userBalance');
        if (savedBalance && !isNaN(parseFloat(savedBalance))) {
            userData.balance = parseFloat(savedBalance);
            updateBalanceUI();
        }
        
        // Сохраняем баланс при изменении
        setInterval(() => {
            localStorage.setItem('userBalance', userData.balance);
        }, 1000);
    </script>
</body>
</html>
