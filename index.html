<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Wheel Case | TON Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0b1a 0%, #0f111f 100%);
            font-family: -apple-system, 'Poppins', 'Segoe UI', system-ui, sans-serif;
            color: #fff;
            min-height: 100vh;
        }

        .app {
            max-width: 500px;
            margin: 0 auto;
            padding: 16px;
            padding-bottom: 80px;
        }

        /* Верхняя панель */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            margin-bottom: 16px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            font-size: 28px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .user-stats {
            display: flex;
            gap: 12px;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(255, 255, 255, 0.08);
            padding: 6px 12px;
            border-radius: 30px;
            font-weight: bold;
        }

        /* Баннер */
        .banner {
            background: linear-gradient(135deg, #ff3366, #ff6b6b);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: center;
        }

        .banner-title {
            font-size: 18px;
            font-weight: bold;
        }

        .banner-timer {
            font-size: 24px;
            font-weight: bold;
            font-family: monospace;
            margin-top: 8px;
        }

        /* Колесо */
        .wheel-section {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }

        .wheel-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 0 6px rgba(255, 215, 0, 0.3);
        }

        .wheel-pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-top: 35px solid #ffd700;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.5));
            z-index: 10;
        }

        .spin-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
            transition: transform 0.2s;
            z-index: 15;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .spin-btn:active {
            transform: translateX(-50%) scale(0.95);
        }

        .spin-btn span {
            font-size: 16px;
            font-weight: bold;
            color: #1a1a2e;
        }

        .spin-btn small {
            font-size: 10px;
            color: #1a1a2e;
        }

        /* Информация о шансах */
        .segments-info {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #8899aa;
            margin-bottom: 16px;
            text-align: center;
        }

        .segments-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .segment-badge {
            border-radius: 12px;
            padding: 10px;
            text-align: center;
        }

        .segment-badge span {
            display: block;
            font-weight: bold;
            font-size: 14px;
        }

        .segment-badge small {
            font-size: 11px;
            opacity: 0.8;
        }

        /* Ставки */
        .bet-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .color-buttons {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
        }

        .color-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent;
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            text-align: center;
        }

        .color-btn.blue {
            border-color: #3b82f6;
        }

        .color-btn.green {
            border-color: #22c55e;
        }

        .color-btn.active {
            background: rgba(255, 255, 255, 0.15);
        }

        .color-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin: 0 auto 8px;
        }

        .color-btn.blue .color-circle {
            background: #3b82f6;
            box-shadow: 0 0 15px #3b82f6;
        }

        .color-btn.green .color-circle {
            background: #22c55e;
            box-shadow: 0 0 15px #22c55e;
        }

        .color-btn span {
            font-size: 16px;
            font-weight: bold;
            display: block;
        }

        .bet-input {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .bet-input input {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px;
            color: white;
            font-size: 16px;
            text-align: center;
        }

        .bet-input input:focus {
            outline: none;
            border-color: #ffd700;
        }

        .place-bet-btn {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            border-radius: 12px;
            padding: 0 24px;
            font-weight: bold;
            color: #1a1a2e;
            cursor: pointer;
        }

        .bet-limits {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #8899aa;
        }

        /* Таймер */
        .timer-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }

        .timer-circle {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 12px;
        }

        .timer-circle svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .timer-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .timer-text span {
            font-size: 32px;
            font-weight: bold;
        }

        .timer-status {
            font-size: 14px;
            color: #ffd700;
        }

        /* Результат */
        .result-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }

        /* История */
        .history-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 16px;
        }

        .history-list {
            max-height: 150px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 13px;
        }

        .history-win {
            color: #ffd700;
        }

        .history-loss {
            color: #ff6b6b;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #0f111f);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            border: 2px solid #ffd700;
        }

        .modal-amount {
            font-size: 48px;
            font-weight: bold;
            color: #ffd700;
            margin: 20px 0;
        }

        .modal-btn {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            border-radius: 40px;
            padding: 14px 28px;
            font-weight: bold;
            cursor: pointer;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Верхняя панель -->
        <div class="top-bar">
            <div class="logo">
                <span class="logo-icon">🎰</span>
                <span class="logo-text">WHEEL CASE</span>
            </div>
            <div class="user-stats">
                <div class="stat">
                    <span>💰</span>
                    <span id="balance">100</span>
                </div>
                <div class="stat">
                    <span>🎡</span>
                    <span id="freeSpins">1</span>
                </div>
            </div>
        </div>

        <!-- Баннер -->
        <div class="banner">
            <div class="banner-title">🔥 БЕСПЛАТНОЕ ВРАЩЕНИЕ 🔥</div>
            <div class="banner-timer" id="freeSpinTimer">Доступно!</div>
        </div>

        <!-- Колесо -->
        <div class="wheel-section">
            <div class="wheel-wrapper">
                <canvas id="wheelCanvas" width="400" height="400"></canvas>
                <div class="wheel-pointer"></div>
                <button class="spin-btn" id="spinBtn">
                    <span>КРУТИТЬ</span>
                    <small>бесплатно</small>
                </button>
            </div>
        </div>

        <!-- Шансы выигрыша -->
        <div class="segments-info">
            <div class="section-title">⚡ ВЕРОЯТНОСТЬ ВЫПАДЕНИЯ ⚡</div>
            <div class="segments-grid">
                <div class="segment-badge" style="background: #ff6b6b;"><span>0.01 TON</span><small>33%</small></div>
                <div class="segment-badge" style="background: #ff8c42;"><span>0.02 TON</span><small>33%</small></div>
                <div class="segment-badge" style="background: #ffd166;"><span>0.05 TON</span><small>33%</small></div>
                <div class="segment-badge" style="background: #8ac926;"><span>0.1 TON</span><small>0.25%</small></div>
                <div class="segment-badge" style="background: #4ecdc4;"><span>0.2 TON</span><small>0.25%</small></div>
                <div class="segment-badge" style="background: #4361ee;"><span>0.5 TON</span><small>0.25%</small></div>
                <div class="segment-badge" style="background: #7209b7;"><span>1 TON</span><small>0.25%</small></div>
            </div>
        </div>

        <!-- Ставки -->
        <div class="bet-section">
            <div class="section-title">СДЕЛАЙ СТАВКУ</div>
            <div class="color-buttons">
                <button class="color-btn blue" data-color="blue">
                    <div class="color-circle"></div>
                    <span>СИНИЙ</span>
                    <small>x2</small>
                </button>
                <button class="color-btn green" data-color="green">
                    <div class="color-circle"></div>
                    <span>ЗЕЛЁНЫЙ</span>
                    <small>x2</small>
                </button>
            </div>
            <div class="bet-input">
                <input type="number" id="betAmount" placeholder="Сумма ставки" step="0.1" min="0.1" max="500" value="1">
                <button class="place-bet-btn" id="placeBetBtn">ПОСТАВИТЬ</button>
            </div>
            <div class="bet-limits">
                <span>📉 Мин: 0.1 TON</span>
                <span>📈 Макс: 500 TON</span>
                <span>🏆 Коэф: x2</span>
            </div>
        </div>

        <!-- Таймер -->
        <div class="timer-section" id="timerSection">
            <div class="timer-circle">
                <svg viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="8"/>
                    <circle cx="50" cy="50" r="45" fill="none" stroke="#ffd700" stroke-width="8" id="timerProgress" stroke-dasharray="283" stroke-dashoffset="0"/>
                </svg>
                <div class="timer-text">
                    <span id="timerSeconds">15</span>
                    <small>сек</small>
                </div>
            </div>
            <div class="timer-status" id="timerStatus">⚡ СТАВКИ ПРИНИМАЮТСЯ...</div>
        </div>

        <!-- Результат -->
        <div class="result-section" id="resultSection">
            <div class="result-icon" id="resultIcon">🎲</div>
            <div class="result-text" id="resultText"></div>
            <div class="result-amount" id="resultAmount"></div>
        </div>

        <!-- История -->
        <div class="history-section">
            <div class="section-title">📜 ИСТОРИЯ</div>
            <div class="history-list" id="historyList">
                <div class="history-empty">Нет истории</div>
            </div>
        </div>
    </div>

    <!-- Модальное окно -->
    <div class="modal" id="winModal">
        <div class="modal-content">
            <div class="modal-icon">🎉🎊🎉</div>
            <div class="modal-amount" id="modalAmount">+0 TON</div>
            <button class="modal-btn" onclick="closeModal()">ЗАБРАТЬ</button>
        </div>
    </div>

    <script>
        // ==================== ДАННЫЕ ПОЛЬЗОВАТЕЛЯ ====================
        let userData = {
            balance: 100,
            freeSpins: 1,
            lastFreeSpin: localStorage.getItem('lastFreeSpin') ? parseInt(localStorage.getItem('lastFreeSpin')) : 0
        };

        // ==================== НАСТРОЙКИ КОЛЕСА ====================
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        let spinAngle = 0;
        let spinning = false;
        let currentBet = null;
        let selectedColor = null;
        let timerInterval = null;
        let timeLeft = ROUND_DURATION;

        // Константы игры
        const MIN_BET = 0.1;
        const MAX_BET = 500;
        const WIN_MULTIPLIER = 2.0;
        const ROUND_DURATION = 15;
        const FREE_SPIN_COOLDOWN_MS = 24 * 60 * 60 * 1000; // 24 часа

        // СОЗДАНИЕ 400 СЕКТОРОВ С ПРАВИЛЬНЫМИ ШАНСАМИ
        function createSegments() {
            const seg = [];
            // 0.01 TON - 132 сектора (33%)
            for (let i = 0; i < 132; i++) seg.push({ name: "0.01", value: 0.01, color: "#ff6b6b" });
            // 0.02 TON - 132 сектора (33%)
            for (let i = 0; i < 132; i++) seg.push({ name: "0.02", value: 0.02, color: "#ff8c42" });
            // 0.05 TON - 132 сектора (33%)
            for (let i = 0; i < 132; i++) seg.push({ name: "0.05", value: 0.05, color: "#ffd166" });
            // 0.1 TON - 1 сектор (0.25%)
            seg.push({ name: "0.1", value: 0.1, color: "#8ac926" });
            // 0.2 TON - 1 сектор (0.25%)
            seg.push({ name: "0.2", value: 0.2, color: "#4ecdc4" });
            // 0.5 TON - 1 сектор (0.25%)
            seg.push({ name: "0.5", value: 0.5, color: "#4361ee" });
            // 1 TON - 1 сектор (0.25%)
            seg.push({ name: "1", value: 1, color: "#7209b7" });
            
            // Перемешиваем
            for (let i = seg.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [seg[i], seg[j]] = [seg[j], seg[i]];
            }
            return seg;
        }

        const segments = createSegments();
        const SEGMENT_ANGLE = 360 / segments.length;

        // Рисование колеса
        function drawWheel() {
            const size = canvas.width;
            const centerX = size / 2;
            const centerY = size / 2;
            const radius = size / 2 - 10;
            
            ctx.clearRect(0, 0, size, size);
            
            for (let i = 0; i < segments.length; i++) {
                const startAngle = (i * SEGMENT_ANGLE + spinAngle) * Math.PI / 180;
                const endAngle = ((i + 1) * SEGMENT_ANGLE + spinAngle) * Math.PI / 180;
                
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.fillStyle = segments[i].color;
                ctx.fill();
                ctx.strokeStyle = "#fff";
                ctx.lineWidth = 0.5;
                ctx.stroke();
                
                // Текст на каждом 20-м секторе
                if (i % 20 === 0) {
                    ctx.save();
                    ctx.translate(centerX, centerY);
                    ctx.rotate(startAngle + SEGMENT_ANGLE / 2 * Math.PI / 180);
                    ctx.textAlign = "center";
                    ctx.fillStyle = "#1a1a2e";
                    ctx.font = "bold 10px 'Segoe UI'";
                    ctx.fillText(segments[i].name, radius - 20, 4);
                    ctx.restore();
                }
            }
            
            // Центр
            ctx.beginPath();
            ctx.arc(centerX, centerY, 35, 0, 360 * Math.PI / 180);
            ctx.fillStyle = "#ffd700";
            ctx.fill();
            ctx.fillStyle = "#1a1a2e";
            ctx.font = "bold 22px sans-serif";
            ctx.fillText("🎡", centerX - 15, centerY + 8);
        }

        // Определение выигрыша по углу
        function getPrizeByAngle(angle) {
            let normalizedAngle = (angle % 360 + 360) % 360;
            const pointerAngle = 90;
            let sectorAngle = (360 - (pointerAngle - normalizedAngle)) % 360;
            let sectorIndex = Math.floor(sectorAngle / SEGMENT_ANGLE);
            sectorIndex = (sectorIndex + segments.length) % segments.length;
            return segments[sectorIndex];
        }

        // БЕСПЛАТНОЕ ВРАЩЕНИЕ
        function isFreeSpinAvailable() {
            const now = Date.now();
            const timeSinceLastSpin = now - userData.lastFreeSpin;
            return timeSinceLastSpin >= FREE_SPIN_COOLDOWN_MS || userData.lastFreeSpin === 0;
        }

        function getRemainingTime() {
            if (isFreeSpinAvailable()) return null;
            const remaining = FREE_SPIN_COOLDOWN_MS - (Date.now() - userData.lastFreeSpin);
            const hours = Math.floor(remaining / 3600000);
            const minutes = Math.floor((remaining % 3600000) / 60000);
            return { hours, minutes, remaining };
        }

        function updateFreeSpinTimer() {
            const timerEl = document.getElementById('freeSpinTimer');
            const spinBtn = document.getElementById('spinBtn');
            
            if (isFreeSpinAvailable()) {
                timerEl.textContent = '✅ ДОСТУПНО!';
                timerEl.style.color = '#ffd700';
                spinBtn.disabled = false;
                spinBtn.style.opacity = '1';
                spinBtn.querySelector('span').textContent = 'КРУТИТЬ';
                spinBtn.querySelector('small').textContent = 'бесплатно';
            } else {
                const remaining = getRemainingTime();
                if (remaining) {
                    timerEl.textContent = `Через ${remaining.hours}ч ${remaining.minutes}мин`;
                    timerEl.style.color = '#8899aa';
                }
                spinBtn.disabled = true;
                spinBtn.style.opacity = '0.5';
                spinBtn.querySelector('span').textContent = 'ЗАНЯТО';
                spinBtn.querySelector('small').textContent = 'ждём 24ч';
            }
        }

        async function spinFreeWheel() {
            if (spinning) return;
            if (!isFreeSpinAvailable()) {
                const remaining = getRemainingTime();
                alert(`❌ Бесплатное вращение будет доступно через ${remaining.hours}ч ${remaining.minutes}мин!`);
                return;
            }
            
            spinning = true;
            
            // Анимация вращения
            const spinDuration = 3000;
            const startTime = Date.now();
            const startAngle = spinAngle;
            const targetSpins = 5 + Math.random() * 8;
            const targetAngle = startAngle + targetSpins * 360;
            
            function animate() {
                const now = Date.now();
                const elapsed = now - startTime;
                const progress = Math.min(1, elapsed / spinDuration);
                const easeOut = 1 - Math.pow(1 - progress, 3);
                spinAngle = startAngle + (targetAngle - startAngle) * easeOut;
                drawWheel();
                
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    finishFreeSpin();
                }
            }
            
            requestAnimationFrame(animate);
        }

        function finishFreeSpin() {
            spinning = false;
            const prize = getPrizeByAngle(spinAngle).value;
            
            // Сохраняем время
            userData.lastFreeSpin = Date.now();
            localStorage.setItem('lastFreeSpin', userData.lastFreeSpin);
            
            // Обновляем баланс
            userData.balance += prize;
            userData.freeSpins = 0;
            updateUI();
            
            // Показываем выигрыш
            showWinModal(prize);
            addToHistory(prize, true);
            updateFreeSpinTimer();
        }

        // СТАВКА НА ЦВЕТ
        function startRound(amount, color) {
            if (amount > userData.balance) {
                alert(`❌ Недостаточно средств! Баланс: ${userData.balance} TON`);
                return false;
            }
            
            // Списываем ставку
            userData.balance -= amount;
            updateUI();
            
            // Показываем таймер
            startTimer(amount, color);
            return true;
        }

        function startTimer(betAmount, betColor) {
            timeLeft = ROUND_DURATION;
            const timerSection = document.getElementById('timerSection');
            const timerSeconds = document.getElementById('timerSeconds');
            const progressEl = document.getElementById('timerProgress');
            timerSection.style.display = 'block';
            
            if (timerInterval) clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                timeLeft--;
                timerSeconds.textContent = timeLeft;
                const circumference = 283;
                const offset = circumference - (timeLeft / ROUND_DURATION) * circumference;
                progressEl.style.strokeDashoffset = offset;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerSection.style.display = 'none';
                    endRound(betAmount, betColor);
                }
            }, 1000);
        }

        function endRound(betAmount, betColor) {
            // Симуляция результата (50/50)
            const isWin = Math.random() < 0.5;
            
            if (isWin) {
                const winAmount = betAmount * WIN_MULTIPLIER;
                userData.balance += winAmount;
                updateUI();
                showResult(true, betAmount, winAmount);
                addToHistory(winAmount, true);
                showWinModal(winAmount);
            } else {
                showResult(false, betAmount, 0);
                addToHistory(betAmount, false);
            }
        }

        function showResult(isWin, betAmount, winAmount) {
            const resultSection = document.getElementById('resultSection');
            const resultIcon = document.getElementById('resultIcon');
            const resultText = document.getElementById('resultText');
            const resultAmount = document.getElementById('resultAmount');
            
            if (isWin) {
                resultIcon.textContent = '🎉';
                resultText.textContent = 'ПОБЕДА!';
                resultAmount.textContent = `+${winAmount.toFixed(2)} TON`;
                resultAmount.style.color = '#ffd700';
            } else {
                resultIcon.textContent = '😔';
                resultText.textContent = 'ПРОИГРЫШ';
                resultAmount.textContent = `-${betAmount.toFixed(2)} TON`;
                resultAmount.style.color = '#ff6b6b';
            }
            
            resultSection.style.display = 'block';
            setTimeout(() => {
                resultSection.style.display = 'none';
            }, 3000);
        }

        function showWinModal(amount) {
            const modal = document.getElementById('winModal');
            document.getElementById('modalAmount').textContent = `+${amount.toFixed(2)} TON`;
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('winModal').style.display = 'none';
        }

        function addToHistory(amount, isWin) {
            const historyList = document.getElementById('historyList');
            const emptyMsg = historyList.querySelector('.history-empty');
            if (emptyMsg) emptyMsg.remove();
            
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `
                <span>${new Date().toLocaleTimeString()}</span>
                <span class="${isWin ? 'history-win' : 'history-loss'}">
                    ${isWin ? '+' : '-'}${amount.toFixed(2)} TON
                </span>
            `;
            historyList.insertBefore(item, historyList.firstChild);
            
            if (historyList.children.length > 20) {
                historyList.removeChild(historyList.lastChild);
            }
        }

        function updateUI() {
            document.getElementById('balance').textContent = userData.balance.toFixed(2);
            document.getElementById('freeSpins').textContent = isFreeSpinAvailable() ? 1 : 0;
        }

        // ==================== ОБРАБОТЧИКИ СОБЫТИЙ ====================
        document.getElementById('spinBtn').addEventListener('click', spinFreeWheel);
        
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedColor = btn.dataset.color;
            });
        });
        
        document.getElementById('placeBetBtn').addEventListener('click', () => {
            if (!selectedColor) {
                alert('❌ Выберите цвет (Синий или Зелёный)');
                return;
            }
            
            const amount = parseFloat(document.getElementById('betAmount').value);
            if (isNaN(amount) || amount < MIN_BET || amount > MAX_BET) {
                alert(`❌ Сумма ставки должна быть от ${MIN_BET} до ${MAX_BET} TON`);
                return;
            }
            
            if (amount > userData.balance) {
                alert(`❌ Недостаточно средств! Баланс: ${userData.balance} TON`);
                return;
            }
            
            startRound(amount, selectedColor);
        });
        
        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        drawWheel();
        updateUI();
        updateFreeSpinTimer();
        setInterval(updateFreeSpinTimer, 60000);
        
        // Эффект конфетти
        function createConfetti() {
            const confetti = document.createElement('div');
            confetti.style.position = 'fixed';
            confetti.style.left = Math.random() * 100 + '%';
            confetti.style.top = '-10px';
            confetti.style.width = '8px';
            confetti.style.height = '8px';
            confetti.style.background = `hsl(${Math.random() * 360}, 100%, 50%)`;
            confetti.style.borderRadius = '50%';
            confetti.style.animation = 'fall 3s linear forwards';
            confetti.style.zIndex = '2000';
            document.body.appendChild(confetti);
            setTimeout(() => confetti.remove(), 3000);
        }
        
        window.confetti = createConfetti;
        window.closeModal = closeModal;
    </script>
</body>
</html>
