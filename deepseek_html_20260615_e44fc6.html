<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Wheel of Fortune | TON</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0d1525 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .container {
            max-width: 550px;
            width: 100%;
            margin: 0 auto;
            background: rgba(10, 15, 30, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 20px 16px 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,215,0,0.2);
        }

        /* баланс */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            background: rgba(0,0,0,0.5);
            border-radius: 60px;
            padding: 8px 20px;
        }
        .balance-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1e293b;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: bold;
        }
        .balance-box span:first-child { font-size: 20px; }
        .balance-amount {
            font-size: 20px;
            color: #ffd966;
        }

        /* заголовок */
        .title {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD966, #FFA559);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 8px 0 8px;
            letter-spacing: 2px;
        }

        /* колесо */
        .wheel-wrapper {
            position: relative;
            width: 100%;
            max-width: 340px;
            margin: 16px auto;
        }
        canvas {
            width: 100%;
            height: auto;
            background: #1a1a2e;
            border-radius: 50%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5), 0 0 0 6px rgba(255,215,0,0.3);
            display: block;
        }
        .pointer {
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-top: 40px solid #FFD966;
            filter: drop-shadow(0 4px 8px black);
            z-index: 10;
        }
        .spin-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #FFD966, #FFA559);
            border: none;
            border-radius: 50%;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 5px 15px black;
            transition: 0.1s linear;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #1e293b;
            z-index: 20;
        }
        .spin-btn:active { transform: translateX(-50%) scale(0.96); }
        .spin-btn span:first-child { font-size: 22px; font-weight: 800; }
        .spin-btn small { font-size: 9px; opacity: 0.9; }

        /* шансы */
        .chances {
            background: rgba(255,255,255,0.05);
            border-radius: 28px;
            padding: 16px 12px;
            margin: 20px 0 12px;
        }
        .chances h3 {
            font-size: 14px;
            text-align: center;
            letter-spacing: 1px;
            margin-bottom: 12px;
            color: #bbb;
        }
        .chance-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            text-align: center;
        }
        .chance-item {
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            padding: 8px 4px;
            font-size: 13px;
            font-weight: bold;
        }
        .chance-item span:first-child { display: block; font-size: 16px; }
        .chance-item small { font-size: 10px; color: #ffd966; }

        /* кнопка связи с ботом (пока просто тест) */
        .ton-connect {
            background: #0098EA;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            margin-top: 12px;
            font-size: 16px;
        }

        /* модалка победы */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-card {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-radius: 48px;
            padding: 32px 24px;
            text-align: center;
            border: 2px solid #ffd966;
            width: 280px;
        }
        .modal-card h2 { font-size: 32px; margin: 8px 0; }
        .win-amount { font-size: 48px; font-weight: bold; color: #ffd966; margin: 12px 0; }
        .modal-card button {
            background: #ffd966;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: bold;
            margin-top: 12px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <div class="balance-box">💰 <span class="balance-amount" id="balanceDisplay">0.00</span> TON</div>
        <div class="balance-box">🎡 <span id="freeSpinStatus">1 раз/24ч</span></div>
    </div>
    <div class="title">⚡ WHEEL FORTUNE ⚡</div>

    <div class="wheel-wrapper">
        <canvas id="wheelCanvas" width="500" height="500"></canvas>
        <div class="pointer"></div>
        <button class="spin-btn" id="spinBtn">
            <span>КРУТИТЬ</span>
            <small>бесплатно</small>
        </button>
    </div>

    <div class="chances">
        <h3>🎲 ВЕРОЯТНОСТИ ВЫИГРЫША 🎲</h3>
        <div class="chance-grid">
            <div class="chance-item" style="background:#ff6b6b20"><span>0.01 TON</span><small>33%</small></div>
            <div class="chance-item" style="background:#ff8c4220"><span>0.02 TON</span><small>33%</small></div>
            <div class="chance-item" style="background:#ffd16620"><span>0.05 TON</span><small>33%</small></div>
            <div class="chance-item" style="background:#8ac92620"><span>0.1 TON</span><small>0.25%</small></div>
            <div class="chance-item" style="background:#4ecdc420"><span>0.2 TON</span><small>0.25%</small></div>
            <div class="chance-item" style="background:#4361ee20"><span>0.5 TON</span><small>0.25%</small></div>
            <div class="chance-item" style="background:#7209b720"><span>1 TON</span><small>0.25%</small></div>
        </div>
    </div>

    <button class="ton-connect" id="connectWalletBtn">🔗 ПРИВЯЗАТЬ TON КОШЕЛЁК</button>
</div>

<div id="winModal" class="modal">
    <div class="modal-card">
        <div>🎉🎊🎉</div>
        <h2>ПОБЕДА!</h2>
        <div class="win-amount" id="winAmount">+0 TON</div>
        <button onclick="closeModal()">ЗАБРАТЬ</button>
    </div>
</div>

<script>
    // ---------- НАСТРОЙКИ КОЛЕСА (400 секторов, точные шансы) ----------
    function buildSegments() {
        const seg = [];
        // 0.01 TON — 33% = 132 шт
        for(let i=0; i<132; i++) seg.push({ name:"0.01", value:0.01, color:"#ff6b6b" });
        // 0.02 TON — 33% = 132 шт
        for(let i=0; i<132; i++) seg.push({ name:"0.02", value:0.02, color:"#ff8c42" });
        // 0.05 TON — 33% = 132 шт
        for(let i=0; i<132; i++) seg.push({ name:"0.05", value:0.05, color:"#ffd166" });
        // 0.1 TON — 1 шт (0.25%)
        seg.push({ name:"0.1", value:0.1, color:"#8ac926" });
        // 0.2 TON — 1 шт
        seg.push({ name:"0.2", value:0.2, color:"#4ecdc4" });
        // 0.5 TON — 1 шт
        seg.push({ name:"0.5", value:0.5, color:"#4361ee" });
        // 1 TON — 1 шт
        seg.push({ name:"1", value:1, color:"#7209b7" });
        // перемешиваем для случайного порядка
        for(let i=seg.length-1; i>0; i--) {
            const j = Math.floor(Math.random()*(i+1));
            [seg[i], seg[j]] = [seg[j], seg[i]];
        }
        return seg;
    }

    let segments = buildSegments();
    const SEG_ANGLE = 360 / segments.length;  // 0.9°
    let spinAngle = 0;
    let spinning = false;
    let currentBalance = 0.0;
    let lastFreeSpinTime = localStorage.getItem('lastFreeSpin') ? parseInt(localStorage.getItem('lastFreeSpin')) : 0;
    const FREE_SPIN_COOLDOWN = 24 * 60 * 60 * 1000; // 24 часа

    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');

    function drawWheel() {
        const size = canvas.width;
        const cx = size/2, cy = size/2;
        const radius = size/2 - 10;
        ctx.clearRect(0,0,size,size);
        for(let i=0;i<segments.length;i++) {
            const start = (i * SEG_ANGLE + spinAngle) * Math.PI/180;
            const end = ((i+1) * SEG_ANGLE + spinAngle) * Math.PI/180;
            ctx.beginPath();
            ctx.moveTo(cx,cy);
            ctx.arc(cx,cy,radius,start,end);
            ctx.fillStyle = segments[i].color;
            ctx.fill();
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 0.5;
            ctx.stroke();
            // текст на некоторых секторах
            if(i % 20 === 0) {
                ctx.save();
                ctx.translate(cx,cy);
                ctx.rotate(start + SEG_ANGLE/2 * Math.PI/180);
                ctx.textAlign = "center";
                ctx.fillStyle = "#1a1a2e";
                ctx.font = "bold 11px 'Segoe UI'";
                ctx.fillText(segments[i].name, radius-22, 5);
                ctx.restore();
            }
        }
        // центр
        ctx.beginPath();
        ctx.arc(cx,cy,32,0,2*Math.PI);
        ctx.fillStyle = "#FFD966";
        ctx.fill();
        ctx.fillStyle = "#1e293b";
        ctx.font = "24px sans-serif";
        ctx.fillText("🎡", cx-14, cy+8);
    }

    function getPrize() {
        let normAngle = (spinAngle % 360 + 360) % 360;
        const pointer = 90; // сверху
        let sectorAngle = (360 - (pointer - normAngle)) % 360;
        let idx = Math.floor(sectorAngle / SEG_ANGLE);
        idx = (idx + segments.length) % segments.length;
        return segments[idx];
    }

    function isFreeSpinAvailable() {
        const now = Date.now();
        return (now - lastFreeSpinTime) >= FREE_SPIN_COOLDOWN;
    }

    function getRemainingTimeText() {
        const now = Date.now();
        const diff = (lastFreeSpinTime + FREE_SPIN_COOLDOWN) - now;
        if(diff <= 0) return "ГОТОВО!";
        const hours = Math.floor(diff / 3600000);
        const minutes = Math.floor((diff % 3600000) / 60000);
        return `${hours}ч ${minutes}м`;
    }

    function updateUI() {
        document.getElementById('balanceDisplay').innerText = currentBalance.toFixed(2);
        const available = isFreeSpinAvailable();
        const btn = document.getElementById('spinBtn');
        const statusSpan = document.getElementById('freeSpinStatus');
        if(available) {
            btn.disabled = false;
            btn.style.opacity = "1";
            btn.querySelector('span').innerText = "КРУТИТЬ";
            btn.querySelector('small').innerHTML = "бесплатно";
            statusSpan.innerText = "✅ доступно";
        } else {
            btn.disabled = true;
            btn.style.opacity = "0.6";
            const remain = getRemainingTimeText();
            btn.querySelector('span').innerText = `${remain}`;
            btn.querySelector('small').innerHTML = "до вращения";
            statusSpan.innerText = `⏳ ${remain}`;
        }
    }

    function showWin(amount) {
        const modal = document.getElementById('winModal');
        document.getElementById('winAmount').innerHTML = `+${amount.toFixed(3)} TON`;
        modal.style.display = 'flex';
        // эффект конфетти (простые emoji)
        for(let i=0;i<20;i++) {
            const conf = document.createElement('div');
            conf.innerText = ['🎉','✨','🎊','💎','🎡'][Math.floor(Math.random()*5)];
            conf.style.position = 'fixed';
            conf.style.left = Math.random()*100 + '%';
            conf.style.top = '-20px';
            conf.style.fontSize = '24px';
            conf.style.pointerEvents = 'none';
            conf.style.animation = 'fall 2s linear forwards';
            document.body.appendChild(conf);
            setTimeout(()=>conf.remove(),2000);
        }
        currentBalance += amount;
        updateUI();
        localStorage.setItem('balance', currentBalance.toFixed(6));
    }

    window.closeModal = function() {
        document.getElementById('winModal').style.display = 'none';
    };

    async function spinWheel() {
        if(spinning) return;
        if(!isFreeSpinAvailable()) {
            alert(`⏳ Бесплатное вращение через ${getRemainingTimeText()}`);
            return;
        }
        spinning = true;
        const startTime = Date.now();
        const startAngle = spinAngle;
        const targetSpins = 8 + Math.random() * 8;
        const targetAngle = startAngle + targetSpins * 360;
        const duration = 2800;
        function animate() {
            const elapsed = Date.now() - startTime;
            const t = Math.min(1, elapsed/duration);
            const ease = 1 - Math.pow(1-t, 3);
            spinAngle = startAngle + (targetAngle - startAngle) * ease;
            drawWheel();
            if(t < 1) requestAnimationFrame(animate);
            else finishSpin();
        }
        requestAnimationFrame(animate);
    }

    function finishSpin() {
        spinning = false;
        const prizeObj = getPrize();
        const winValue = prizeObj.value;
        lastFreeSpinTime = Date.now();
        localStorage.setItem('lastFreeSpin', lastFreeSpinTime);
        showWin(winValue);
        // можно отправить событие в Telegram WebApp (опционально)
        if(window.Telegram?.WebApp) {
            window.Telegram.WebApp.sendData(JSON.stringify({ action:"free_spin", amount:winValue }));
        }
        updateUI();
        // пересоздаём сектора? нет, шансы уже заложены. Но если хотим сохранить перемешивание, можем заново собрать массив
        segments = buildSegments(); // обновляем порядок секторов (не влияет на шансы, только на порядок)
        drawWheel();
    }

    // Инициализация Telegram WebApp, если есть
    if(window.Telegram?.WebApp) {
        window.Telegram.WebApp.expand();
        window.Telegram.WebApp.enableClosingConfirmation();
    }

    // Восстановление баланса из localStorage
    const saved = localStorage.getItem('balance');
    if(saved && !isNaN(parseFloat(saved))) currentBalance = parseFloat(saved);
    else currentBalance = 0.0;
    updateUI();
    drawWheel();

    document.getElementById('spinBtn').addEventListener('click', spinWheel);
    document.getElementById('connectWalletBtn').addEventListener('click', () => {
        alert("⚡ В реальном боте здесь будет подключение TON кошелька. Сейчас просто демо. Баланс сохраняется в браузере.");
        // для полноценной интеграции с TON нужно добавить @tonconnect/ui
    });
    // добавим анимацию падения
    const styleSheet = document.createElement("style");
    styleSheet.textContent = `
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
    `;
    document.head.appendChild(styleSheet);
</script>
</body>
</html>
